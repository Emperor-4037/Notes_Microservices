apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-qa-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-qa-service
  template:
    metadata:
      labels:
        app: rag-qa-service
    spec:
      containers:
      - name: rag-qa-service
        image: study-assistant/rag-qa-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: rag-qa-service
spec:
  selector:
    app: rag-qa-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
