apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-service
  namespace: notes-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-service
  template:
    metadata:
      labels:
        app: notes-service
    spec:
      containers:
      - name: notes-service
        image: study-assistant/notes-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres:5432/notes_microservices"
---
apiVersion: v1
kind: Service
metadata:
  name: notes-service
  namespace: notes-microservices
spec:
  selector:
    app: notes-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
