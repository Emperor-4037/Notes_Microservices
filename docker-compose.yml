version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=notes_microservices
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      - USER_SERVICE_URL=http://user-service:8000
      - NOTES_SERVICE_URL=http://notes-service:8000
      - STUDY_SESSION_SERVICE_URL=http://study-session-service:8000
      - RAG_QA_SERVICE_URL=http://rag-qa-service:8000
    depends_on:
      - user-service
      - notes-service
      - study-session-service
      - rag-qa-service
      - postgres

  user-service:
    build: ./user-service
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/notes_microservices
    depends_on:
      - postgres

  notes-service:
    build: ./notes-service
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/notes_microservices
    depends_on:
      - postgres

  study-session-service:
    build: ./study-session-service
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/notes_microservices
    depends_on:
      - postgres

  rag-qa-service:
    build: ./rag-qa-service
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/notes_microservices
      - NOTES_SERVICE_URL=http://notes-service:8000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
